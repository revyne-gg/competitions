include:
  - template: Security/SAST.gitlab-ci.yml
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never

stages:
  - build
  - test
  - migrate
  - publish
  - deploy

variables:
  IMAGE_NAME: registry.gitlab.com/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"


build:
  stage: build
  tags:
    - dotnet
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet nuget update source gitlab
        --username gitlab-ci-token
        --password $CI_JOB_TOKEN
        --store-password-in-clear-text
    - echo "Restoring .NET dependencies..."
    - dotnet restore competitions.csproj

    - echo "Building .NET project..."
    - dotnet build competitions.csproj -c Release --no-restore

    - echo "Publishing..."
    - dotnet publish competitions.csproj -c Release -o publish --no-restore
  artifacts:
    paths:
      - publish/
      - "**/obj/"
      - "**/bin/"
    expire_in: 1 week

sast:
  stage: test

test:
  stage: test
  tags:
    - dotnet
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - echo "Running tests..."
    - dotnet test --no-build --verbosity normal
  needs:
    - build

run-migrations:
  stage: migrate
  tags:
    - dotnet
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - echo "Running migrations for $CI_PROJECT_NAME..."
    - dotnet nuget update source gitlab
        --username gitlab-ci-token
        --password $CI_JOB_TOKEN
        --store-password-in-clear-text
    - dotnet tool restore
    - dotnet restore competitions.csproj
    - export DATABASE_URL=$DATABASE_URL
    - dotnet build competitions.csproj -c Release --no-restore
    - dotnet ef database update --project competitions.csproj
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  needs:
    - test

docker_push_latest:
  stage: publish
  tags:
    - dotnet
  image: docker:27
  services:
    - docker:27-dind
  script:
    - echo "$CI_JOB_TOKEN" | docker login registry.gitlab.com -u gitlab-ci-token --password-stdin

    - docker buildx create --use
    - docker buildx build --platform linux/amd64,linux/arm64 --build-arg -t $IMAGE_NAME:latest -t $IMAGE_NAME:$CI_COMMIT_SHA --push .
  only:
    - main
  needs:
    - run-migrations
  environment: staging

docker_push_tag:
  stage: publish
  tags:
    - dotnet
  image: docker:27
  services:
    - docker:27-dind
  script:
    - echo "$CI_JOB_TOKEN" | docker login registry.gitlab.com -u gitlab-ci-token --password-stdin

    - export VERSION_TAG=$CI_COMMIT_REF_NAME

    - docker buildx create --use
    - docker buildx build --platform linux/amd64,linux/arm64 --build-arg -t $IMAGE_NAME:$VERSION_TAG --push .
  only:
    - tags
  needs:
    - run-migrations
  environment: production
